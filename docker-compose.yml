services:
  client:
    build:
      context: ${SENDIT_FRONTEND_PATH:-../SendItCycles-FrontEnd}
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    ports:
      - "3000:80"
    environment:
      - API_UPSTREAM=${SENDIT_API_UPSTREAM:-http://server:5000}
    depends_on:
      - server
    networks:
      - senditcycles
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3

  server:
    build:
      context: ${SENDIT_BACKEND_PATH:-../SendItCycles-BackEnd}
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - USE_SQLITE=true
      - SQLITE_PATH=/data/senditcycles.db
      - JWT_SECRET=${JWT_SECRET:-demo-secret-key-change-in-production}
      - JWT_EXPIRES_IN=24h
    volumes:
      - server_data:/data
    networks:
      - senditcycles
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  senditcycles:
    driver: bridge

volumes:
  server_data:
    driver: local
