services:
  db:
    image: postgres:15-alpine
    container_name: senditcycles_db
    environment:
      POSTGRES_USER: sendit
      POSTGRES_PASSWORD: sendit123
      POSTGRES_DB: senditcycles
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ${SENDIT_BACKEND_PATH:-../SendItCycles-BackEnd}/database/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sendit -d senditcycles"]
      interval: 5s
      timeout: 10s
      retries: 10
    networks:
      - senditcycles_network

  server:
    build:
      context: ${SENDIT_BACKEND_PATH:-../SendItCycles-BackEnd}
      dockerfile: Dockerfile
    container_name: senditcycles_server
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: senditcycles
      DB_USER: sendit
      DB_PASSWORD: sendit123
      JWT_SECRET: your_super_secret_jwt_key_change_in_production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - senditcycles_network

  client:
    build:
      context: ${SENDIT_FRONTEND_PATH:-../SendItCycles-FrontEnd}
      dockerfile: Dockerfile
    container_name: senditcycles_client
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://localhost:5000/api
    depends_on:
      - server
    networks:
      - senditcycles_network

networks:
  senditcycles_network:
    driver: bridge

volumes:
  postgres_data:
